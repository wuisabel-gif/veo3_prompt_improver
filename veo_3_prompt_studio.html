<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veo 3 Video Prompt Improver</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      background: #050505;
      color: white;
      font-family: sans-serif;
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState } = React;

function App() {
  const [roughInput, setRoughInput] = useState("");

  return (
    <div className="min-h-screen flex items-center justify-center px-6">
      <div className="w-full max-w-2xl">
        <h1 className="text-5xl font-bold text-center">
          Veo 3 Prompt Studio
        </h1>

        <p className="mt-4 text-neutral-400 text-center">
          AI-powered cinematic prompt generation.
        </p>

        <textarea
          value={roughInput}
          onChange={(e) => setRoughInput(e.target.value)}
          placeholder="Describe a mood or scene..."
          className="w-full mt-8 h-32 p-4 rounded-lg bg-neutral-900 border border-neutral-700"
        />

        <div className="mt-2 text-sm text-neutral-500">
          {roughInput.length} characters
        </div>
      </div>
    </div>
  );
}
const { useState } = React;

const STYLE_CATEGORIES = [
  {
    name: "Runway Couture",
    icon: "👠",
    desc: "High fashion and luxury campaigns"
  },
  {
    name: "Beauty Editorial",
    icon: "📸",
    desc: "Beauty photography and makeup campaigns"
  },
  {
    name: "Cinematic Storytelling",
    icon: "🎬",
    desc: "Narrative visual worlds"
  }
];

function App() {
  const [roughInput, setRoughInput] = useState("");
  const [selectedCategory, setSelectedCategory] = useState(
    STYLE_CATEGORIES[0].name
  );

  return (
    <div className="min-h-screen px-6 py-12 max-w-4xl mx-auto">
      <h1 className="text-5xl font-bold text-center">
        Veo 3 Prompt Studio
      </h1>

      <p className="mt-4 text-center text-neutral-400">
        AI-powered cinematic prompt generation.
      </p>

      <textarea
        value={roughInput}
        onChange={(e) => setRoughInput(e.target.value)}
        placeholder="Describe a mood or scene..."
        className="w-full mt-8 h-32 p-4 rounded-lg bg-neutral-900 border border-neutral-700"
      />

      <div className="mt-8">
        <h2 className="text-lg font-semibold mb-4">
          Choose an aesthetic
        </h2>

        <div className="grid grid-cols-3 gap-4">
          {STYLE_CATEGORIES.map((category) => (
            <button
              key={category.name}
              onClick={() => setSelectedCategory(category.name)}
              className={`p-4 rounded-lg border text-left ${
                selectedCategory === category.name
                  ? "border-cyan-400 bg-neutral-800"
                  : "border-neutral-700 bg-neutral-900"
              }`}
            >
              <div className="text-2xl">
                {category.icon}
              </div>

              <div className="font-semibold mt-2">
                {category.name}
              </div>

              <div className="text-xs text-neutral-400 mt-1">
                {category.desc}
              </div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(
  document.getElementById("root")
).render(<App />);
</script>

</body>
</html>
