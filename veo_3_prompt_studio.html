<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veo 3 Video Prompt Improver</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      background: #050505;
      color: white;
      font-family: sans-serif;
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState } = React;

function App() {
  const [roughInput, setRoughInput] = useState("");

  return (
    <div className="min-h-screen flex items-center justify-center px-6">
      <div className="w-full max-w-2xl">
        <h1 className="text-5xl font-bold text-center">
          Veo 3 Prompt Studio
        </h1>

        <p className="mt-4 text-neutral-400 text-center">
          AI-powered cinematic prompt generation.
        </p>

        <textarea
          value={roughInput}
          onChange={(e) => setRoughInput(e.target.value)}
          placeholder="Describe a mood or scene..."
          className="w-full mt-8 h-32 p-4 rounded-lg bg-neutral-900 border border-neutral-700"
        />

        <div className="mt-2 text-sm text-neutral-500">
          {roughInput.length} characters
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(
  document.getElementById("root")
).render(<App />);
</script>

</body>
</html>
