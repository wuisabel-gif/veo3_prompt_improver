<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veo 3 Prompt Studio - Placeholder Prototype</title>

  <!-- Tailwind is loaded from the CDN so this can stay as one HTML file. -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React runs directly in the browser for this lightweight prototype. -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      background: #050505;
      color: #f5f5f5;
      font-family: Arial, Helvetica, sans-serif;
    }
  </style>
</head>
<body class="min-h-full bg-neutral-950 text-neutral-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const STYLE_CATEGORIES = [
      "Fashion",
      "Music Video",
      "Cinematic",
      "Experimental"
    ];

    const PLACEHOLDER_PROMPTS = [
      {
        id: "placeholder-1",
        title: "Fashion Placeholder",
        category: "Fashion",
        prompt: "[PLACEHOLDER FASHION PROMPT]"
      },
      {
        id: "placeholder-2",
        title: "Music Video Placeholder",
        category: "Music Video",
        prompt: "[PLACEHOLDER MUSIC VIDEO PROMPT]"
      },
      {
        id: "placeholder-3",
        title: "Cinematic Placeholder",
        category: "Cinematic",
        prompt: "[PLACEHOLDER CINEMATIC PROMPT]"
      },
      {
        id: "placeholder-4",
        title: "Experimental Placeholder",
        category: "Experimental",
        prompt: "[PLACEHOLDER EXPERIMENTAL PROMPT]"
      }
    ];

    function App() {
      const [roughInput, setRoughInput] = useState("");
      const [selectedCategory, setSelectedCategory] = useState("Fashion");
      const [outputPrompt, setOutputPrompt] = useState("");
      const [activeTab, setActiveTab] = useState("studio");

      const generatePlaceholderPrompt = () => {
        const template = PLACEHOLDER_PROMPTS.find(
          item => item.category === selectedCategory
        );

        setOutputPrompt(`Ultra-cinematic ${selectedCategory} visualizer.

Input idea:
${roughInput || "[USER IDEA PLACEHOLDER]"}

Generated prompt:
${template.prompt}

Scene visuals:
• [PLACEHOLDER VISUAL DETAIL 1]
• [PLACEHOLDER VISUAL DETAIL 2]
• [PLACEHOLDER VISUAL DETAIL 3]

Visual style:
[PLACEHOLDER CAMERA / LIGHTING / TEXTURE]

Color palette:
[PLACEHOLDER COLORS]

Mood:
[PLACEHOLDER MOOD]

Camera:
[PLACEHOLDER CAMERA MOVEMENT]

Music style:
[PLACEHOLDER MUSIC STYLE]`);
      };

      const copyOutput = () => {
        navigator.clipboard.writeText(outputPrompt);
      };

      return (
        <div className="min-h-screen flex flex-col">
          <header className="border-b border-neutral-800 bg-neutral-950 px-6 py-4">
            <div className="max-w-5xl mx-auto flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
              <div>
                <h1 className="text-xl font-bold">Veo 3 Prompt Studio</h1>
                <p className="text-sm text-neutral-400">Primitive placeholder prototype</p>
              </div>

              <nav className="flex gap-2">
                <button
                  onClick={() => setActiveTab("studio")}
                  className={`px-4 py-2 rounded-lg text-sm ${activeTab === "studio" ? "bg-cyan-500 text-neutral-950" : "bg-neutral-900 text-neutral-300"}`}
                >
                  Studio
                </button>
                <button
                  onClick={() => setActiveTab("library")}
                  className={`px-4 py-2 rounded-lg text-sm ${activeTab === "library" ? "bg-cyan-500 text-neutral-950" : "bg-neutral-900 text-neutral-300"}`}
                >
                  Library
                </button>
              </nav>
            </div>
          </header>

          <main className="flex-1 max-w-5xl w-full mx-auto px-6 py-8">
            {activeTab === "studio" && (
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <section className="bg-neutral-900 border border-neutral-800 rounded-2xl p-6 space-y-5">
                  <div>
                    <label className="block text-sm font-semibold mb-2">
                      1. Rough idea
                    </label>
                    <textarea
                      value={roughInput}
                      onChange={event => setRoughInput(event.target.value)}
                      placeholder="Type a simple idea here..."
                      className="w-full h-40 bg-neutral-950 border border-neutral-700 rounded-xl p-4 text-sm text-neutral-100 placeholder-neutral-500 focus:outline-none focus:border-cyan-400"
                    />
                  </div>

                  <div>
                    <label className="block text-sm font-semibold mb-2">
                      2. Category
                    </label>
                    <div className="grid grid-cols-2 gap-2">
                      {STYLE_CATEGORIES.map(category => (
                        <button
                          key={category}
                          onClick={() => setSelectedCategory(category)}
                          className={`p-3 rounded-xl border text-sm text-left ${selectedCategory === category ? "bg-cyan-500 text-neutral-950 border-cyan-500" : "bg-neutral-950 text-neutral-300 border-neutral-700"}`}
                        >
                          {category}
                        </button>
                      ))}
                    </div>
                  </div>

                  <button
                    onClick={generatePlaceholderPrompt}
                    className="w-full bg-cyan-500 hover:bg-cyan-400 text-neutral-950 font-bold py-3 rounded-xl"
                  >
                    Generate Placeholder Prompt
                  </button>
                </section>

                <section className="bg-neutral-900 border border-neutral-800 rounded-2xl p-6 space-y-4">
                  <div className="flex items-center justify-between">
                    <h2 className="text-sm font-semibold">Output</h2>
                    {outputPrompt && (
                      <button
                        onClick={copyOutput}
                        className="text-xs bg-neutral-800 hover:bg-neutral-700 px-3 py-2 rounded-lg"
                      >
                        Copy
                      </button>
                    )}
                  </div>

                  <pre className="min-h-[360px] whitespace-pre-wrap bg-neutral-950 border border-neutral-800 rounded-xl p-4 text-xs leading-relaxed text-neutral-300">
                    {outputPrompt || "[GENERATED PLACEHOLDER PROMPT WILL APPEAR HERE]"}
                  </pre>
                </section>
              </div>
            )}

            {activeTab === "library" && (
              <section className="bg-neutral-900 border border-neutral-800 rounded-2xl p-6">
                <h2 className="text-lg font-bold mb-4">Placeholder Prompt Library</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {PLACEHOLDER_PROMPTS.map(item => (
                    <article
                      key={item.id}
                      className="bg-neutral-950 border border-neutral-800 rounded-xl p-4 space-y-3"
                    >
                      <div>
                        <h3 className="font-semibold">{item.title}</h3>
                        <p className="text-xs text-cyan-400">{item.category}</p>
                      </div>
                      <p className="text-sm text-neutral-400">{item.prompt}</p>
                      <button
                        onClick={() => {
                          setSelectedCategory(item.category);
                          setOutputPrompt(item.prompt);
                          setActiveTab("studio");
                        }}
                        className="text-xs bg-neutral-800 hover:bg-neutral-700 px-3 py-2 rounded-lg"
                      >
                        Load Placeholder
                      </button>
                    </article>
                  ))}
                </div>
              </section>
            )}
          </main>

          <footer className="border-t border-neutral-800 px-6 py-4 text-center text-xs text-neutral-500">
            © 2026 Veo 3 Prompt Studio Placeholder Prototype
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
