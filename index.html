            showNotification("Generation blocked for safety.", "error");

            showNotification("Prompt enhanced successfully!", "success");
          } else {

          setIsGenerating(false);
          return;

          setEnhancedOutput(fallbackText);
          setIsGenerating(false);
          return;

                      ))}
                    </div>
                  </div>

                </div>

                <div className="bg-neutral-900/30 border border-neutral-850 p-7 rounded-2xl space-y-4">
                  <h3 className="text-sm font-bold text-neutral-100 uppercase tracking-wide font-mono">MULTI-STYLE MODEL SELECTION</h3>
                  <p className="text-xs text-neutral-400 leading-relaxed">
                    Different visual concepts require different prompt architectures. Users can select from specialized visual models trained around recurring aesthetic patterns such as runway fashion, beauty editorials, luxury noir, festival culture, fantasy worlds, and cinematic storytelling.
                  </p>
                  <div className="flex flex-wrap gap-2">
                    {STYLE_CATEGORIES.map(cat => (
                      <span key={cat.name} className="text-[10px] bg-neutral-950 border border-neutral-850 text-neutral-400 px-3 py-1 rounded-full font-mono">
                        {cat.icon} {cat.name}
                      </span>
                    ))}
                  </div>
                </div>

                <div className="bg-neutral-900/30 border border-neutral-850 p-8 rounded-3xl space-y-4 shadow-sm">
                  <h3 className="text-md font-bold text-white flex items-center gap-2 font-display">
                    <Icon name="sparkles" className="w-4 h-4 text-cyan-400" />
                    Standardized Visual Brief Specification
                  </h3>
                  <p className="text-xs text-neutral-400 leading-relaxed">
                    All outputs follow a consistent creative-director structure so prompts stay visually coherent, stylistically consistent, and optimized for cinematic Veo 3 generation.
                  </p>

                  <div className="bg-neutral-950 border border-neutral-850 rounded-xl p-5 font-mono text-[11px] text-neutral-300 leading-relaxed space-y-2 text-center">
                    <p className="text-cyan-400 font-bold">### Ultra-cinematic [Style Family] visualizer inspired by [Visual Reference]...</p>
                    <p className="text-neutral-200">A [Main Subject] in [Environment]...</p>
                    <p className="text-indigo-400 font-bold mt-3 uppercase tracking-wider text-[10px]">Scene visuals:</p>
                    <p className="text-neutral-400">• [Visual Detail]</p>
                    <p className="text-neutral-400">• [Motion Cue]</p>
                    <p className="text-neutral-400">• [Environmental Cue]</p>
                    <p className="text-indigo-400 font-bold mt-3 uppercase tracking-wider text-[10px]">Visual style:</p>
                    <p className="text-neutral-400">[Camera Direction]</p>
                    <p className="text-neutral-400">[Lighting Design]</p>
                    <p className="text-neutral-400">[Cinematic References]</p>
                    <p className="text-indigo-400 font-bold mt-3 uppercase tracking-wider text-[10px]">Color palette:</p>
                    <p className="text-neutral-400">[Primary Colors]</p>
                    <p className="text-neutral-400">[Accent Colors]</p>
                    <p className="text-neutral-400">[Lighting Tints]</p>
                    <p className="text-indigo-400 font-bold mt-3 uppercase tracking-wider text-[10px]">Mood:</p>
                    <p className="text-neutral-400">[Atmosphere]</p>
                    <p className="text-indigo-400 font-bold mt-3 uppercase tracking-wider text-[10px]">Camera:</p>
                    <p className="text-neutral-400">[Shot Design]</p>
                  </div>
                </div>

              </div>
            )}

          </main>

          {/* Save prompt dialog. */}
          {showSaveModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fade-in font-sans">
              <div className="bg-neutral-900 border border-neutral-800 rounded-2xl w-full max-w-md p-6 space-y-4 shadow-[0_12px_40px_rgba(0,0,0,0.8)]">
                
                <div className="flex justify-between items-center">
                  <h3 className="font-bold text-neutral-100 flex items-center gap-2 text-sm font-display">
                    <Icon name="bookmark" className="w-4 h-4 text-cyan-400" />
                    Save Custom Prompt Model
                  </h3>
                  <button 
                    onClick={() => setShowSaveModal(false)}
                    className="text-neutral-400 hover:text-white p-1 rounded-lg transition"
                  >
                    <Icon name="x" className="w-5 h-5" />
                  </button>
                </div>

                <div className="space-y-2">
                  <label className="text-[10px] font-bold text-neutral-400 uppercase font-mono">Template Name</label>
                  <input
                    type="text"
                    value={newPromptTitle}
                    onChange={(e) => setNewPromptTitle(e.target.value)}
                    className="w-full bg-neutral-950 border border-neutral-850 rounded-xl px-4 py-3 text-xs text-neutral-200 placeholder-neutral-600 focus:outline-none focus:ring-1 focus:ring-cyan-500/50"
                  />
                </div>

                <div className="space-y-1 text-xs text-neutral-400">
                  <span className="font-semibold block text-[10px] font-mono uppercase text-neutral-500">Categorized under:</span>
                  <span className="inline-block bg-neutral-950 px-3 py-1.5 rounded-lg border border-neutral-850 text-cyan-400 font-bold text-[11px] font-mono">
                    {selectedCategory}
                  </span>
                </div>

                <div className="grid grid-cols-2 gap-3 pt-4 border-t border-neutral-850">
                  <button
                    onClick={() => setShowSaveModal(false)}
                    className="bg-neutral-950 border border-neutral-850 text-xs font-semibold text-neutral-400 py-2.5 rounded-xl transition hover:text-white"
                  >
                    Cancel
                  </button>
                  <button
                    onClick={confirmSavePrompt}
                    className="bg-cyan-500 hover:bg-cyan-600 text-neutral-950 text-xs font-bold py-2.5 rounded-xl transition"
                  >
                    Confirm Save
                  </button>
                </div>

              </div>
            </div>
          )}

          {/* Footer links and credit. */}
          <footer className="bg-neutral-950 border-t border-neutral-900/60 py-8 px-6 mt-16 text-center text-[11px] text-neutral-500 space-y-3 z-10 relative">
            <div className="flex flex-wrap justify-center gap-1.5 max-w-3xl mx-auto">
              {[
                "Veo 3 fashion film", "fashion film prompt", "fashion editorial",
                "runway film", "beauty film", "luxury campaign", "short film",
                "music video", "visualizer", "cinematic prompt engineering", "Google Veo", "Gemini"
              ].map(kw => (
                <span key={kw} className="text-[9px] bg-neutral-900/60 border border-neutral-850 text-neutral-600 px-2 py-0.5 rounded-full font-mono">
                  {kw}
                </span>
              ))}
            </div>
            <p>© 2026 Real — Make it real. All rights by wuisabel-gif on GitHub.</p>
          </footer>

        </div>
      );
    }

    // Mount the app.
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

</body>
</html>
