<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
  <title>Veo 3 Prompt Studio</title>
</head>
<body>
  <header class="header">
    <div class="brand">
      <span class="brand-mark">▲</span>
      <div>
        <div class="brand-title">Be Your Own Director</div>
        <div class="brand-sub">Veo 3 Prompt Studio</div>
      </div>
    </div>
    <button id="settingsBtn" class="icon-btn" title="Settings">⚙</button>
  </header>

  <main class="body">
    <label class="field-label" for="idea">Your rough idea</label>
    <textarea id="idea" class="textarea" rows="3" placeholder="e.g. a girl dancing alone in a neon-lit Seoul apartment at dawn"></textarea>

    <label class="field-label" for="model">Visual model</label>
    <select id="model" class="select"></select>

    <div class="controls-grid">
      <div>
        <label class="field-label" for="dialogue">Dialogue</label>
        <select id="dialogue" class="select"></select>
      </div>
      <div>
        <label class="field-label" for="music">Music</label>
        <select id="music" class="select"></select>
      </div>
      <div>
        <label class="field-label" for="output">Output</label>
        <select id="output" class="select"></select>
      </div>
    </div>

    <div class="controls-grid two">
      <div>
        <label class="field-label" for="aspect">Aspect ratio</label>
        <select id="aspect" class="select"></select>
      </div>
      <div>
        <label class="field-label" for="duration">Duration</label>
        <select id="duration" class="select"></select>
      </div>
    </div>

    <label class="field-label" for="negative">Negative prompt <span class="muted">(optional)</span></label>
    <input id="negative" class="input" type="text" placeholder="e.g. text, watermark, distorted hands" />

    <label class="field-label" for="modifier">Modifier <span class="muted">(optional)</span></label>
    <input id="modifier" class="input" type="text" placeholder="e.g. make it rainy and melancholic" />

    <button id="generateBtn" class="primary-btn">Unlock your creative potential</button>

    <div id="status" class="status" hidden></div>

    <div id="resultWrap" class="result-wrap" hidden>
      <div class="result-head">
        <span class="field-label">Veo 3 prompt</span>
        <button id="copyBtn" class="ghost-btn">Copy</button>
      </div>
      <pre id="result" class="result"></pre>
    </div>
  </main>

  <script src="data.js"></script>
  <script src="popup.js"></script>
</body>
</html>
